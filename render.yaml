services:
  - type: web
    name: nuance-finance-tracker
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: QUEUE_CONNECTION
        value: sync
      - key: CACHE_STORE
        value: database
      - key: SESSION_DRIVER
        value: database
      - key: RUN_MIGRATIONS
        value: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: nuance-finance-db
          property: connectionString
      - key: DB_URL
        fromDatabase:
          name: nuance-finance-db
          property: connectionString

databases:
  - name: nuance-finance-db
    plan: free
    databaseName: nuance_finance
